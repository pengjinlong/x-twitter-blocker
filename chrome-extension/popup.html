<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X/Twitter Blocker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 360px;
      background: #0f0f12;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      font-size: 14px;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 55%, #0f3460 100%);
      padding: 16px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .logo {
      width: 32px; height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
      object-fit: contain;
      display: block;
    }
    .header-titles { flex: 1; min-width: 0; }
    .header-titles h1 {
      font-size: 15px; font-weight: 700; color: #fff;
      letter-spacing: 0.2px; line-height: 1.2;
    }
    #subtitle {
      font-size: 11px; color: rgba(255,255,255,0.4);
      margin-top: 1px; line-height: 1.3;
    }

    /* Language switcher */
    .lang-switcher {
      display: flex;
      gap: 4px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .lang-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);
      border-radius: 5px;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
    .lang-btn.active {
      background: linear-gradient(135deg, #1d9bf0, #6e3fff);
      border-color: transparent;
      color: #fff;
    }

    /* ── Content ── */
    .content { padding: 14px 15px 10px; }

    .section-label {
      font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.9px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }
    .section-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: -4px;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .input-row {
      display: flex; gap: 7px;
      margin-bottom: 10px;
    }
    #newKeyword {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 11px;
      color: #e8e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    #newKeyword:focus {
      border-color: #1d9bf0;
      background: rgba(29,155,240,0.08);
    }
    #newKeyword::placeholder { color: rgba(255,255,255,0.22); font-size: 12px; }

    .btn-add {
      background: linear-gradient(135deg, #1d9bf0, #1a8cdc);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 13px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-add:hover { opacity: 0.88; }
    .btn-add:active { transform: scale(0.96); }

    /* Keyword list */
    .keyword-list {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      min-height: 90px;
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 12px;
    }
    .keyword-list::-webkit-scrollbar { width: 4px; }
    .keyword-list::-webkit-scrollbar-track { background: transparent; }
    .keyword-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
    }
    .keyword-item {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 8px 11px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
      animation: slideIn 0.18s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .keyword-item:last-child { border-bottom: none; }
    .keyword-item:hover { background: rgba(255,255,255,0.04); }
    .keyword-text {
      font-size: 13px; color: #c8c8d8;
      word-break: break-all; line-height: 1.3;
    }
    .btn-remove {
      background: none; border: none;
      color: rgba(255,255,255,0.22);
      cursor: pointer; font-size: 17px; line-height: 1;
      padding: 1px 4px; border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0; margin-left: 8px;
    }
    .btn-remove:hover {
      color: #ff4d4f;
      background: rgba(255,77,79,0.12);
    }
    .empty-hint {
      text-align: center;
      color: rgba(255,255,255,0.18);
      font-size: 12px;
      padding: 22px 20px;
      line-height: 1.8;
    }

    /* Emoji setting */
    .emoji-setting {
      display: flex; align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 13px;
      margin-bottom: 12px;
    }
    .emoji-setting-label {
      display: flex; flex-direction: column; gap: 2px;
    }
    .emoji-setting-label span:first-child {
      font-size: 13px; color: #c8c8d8; font-weight: 500;
    }
    #emojiSub {
      font-size: 11px; color: rgba(255,255,255,0.28);
      max-width: 200px; line-height: 1.35;
    }
    .emoji-counter {
      display: flex; align-items: center; gap: 9px;
    }
    .emoji-counter button {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: #e8e8f0;
      font-size: 16px; line-height: 1;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center;
    }
    .emoji-counter button:hover {
      background: rgba(29,155,240,0.2);
      border-color: #1d9bf0;
    }
    .emoji-counter button:active { transform: scale(0.9); }
    .emoji-counter button:disabled {
      opacity: 0.3; cursor: not-allowed;
    }
    #emojiCountDisplay {
      font-size: 18px; font-weight: 700;
      color: #1d9bf0; min-width: 30px;
      text-align: center; transition: color 0.2s;
    }
    #emojiCountDisplay.off { color: rgba(255,255,255,0.2); }

    /* Footer */
    .footer {
      padding: 0 15px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .status-bar {
      flex: 1;
      font-size: 11.5px;
      color: rgba(255,255,255,0.3);
      min-height: 18px;
      transition: color 0.2s;
    }
    .status-bar.success { color: #4ade80; }
    .status-bar.error   { color: #ff6b6b; }

    .btn-clear {
      background: rgba(255,77,79,0.1);
      color: rgba(255,100,100,0.75);
      border: 1px solid rgba(255,77,79,0.18);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .btn-clear:hover {
      background: rgba(255,77,79,0.2);
      color: #ff4d4f;
      border-color: rgba(255,77,79,0.35);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <img class="logo" src="icons/icon128.png" alt="X/Twitter Blocker" />
      <div class="header-titles">
        <h1 id="titleText">X/Twitter Blocker</h1>
        <div id="subtitle"></div>
      </div>
    </div>
    <div class="lang-switcher" id="langSwitcher">
      <button class="lang-btn active" data-lang="zh">中文</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="ja">日本語</button>
      <button class="lang-btn" data-lang="ko">한국어</button>
      <button class="lang-btn" data-lang="de">Deutsch</button>
      <button class="lang-btn" data-lang="es">Español</button>
    </div>
  </div>

  <div class="content">
    <div class="section-label" id="labelKeywords"></div>
    <div class="section-hint" id="keywordHint"></div>
    <div class="input-row">
      <input type="text" id="newKeyword" autocomplete="off" spellcheck="false" />
      <button class="btn-add" id="btnAdd"></button>
    </div>
    <div class="keyword-list" id="keywordList"></div>

    <div class="section-label" id="labelEmoji"></div>
    <div class="emoji-setting">
      <div class="emoji-setting-label">
        <span id="emojiLabel"></span>
        <span id="emojiSub"></span>
      </div>
      <div class="emoji-counter">
        <button id="btnEmojiMinus">−</button>
        <span id="emojiCountDisplay">2</span>
        <button id="btnEmojiPlus">+</button>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="status-bar" id="statusBar"></div>
    <button class="btn-clear" id="btnClear"></button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
